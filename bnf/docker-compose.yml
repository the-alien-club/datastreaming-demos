networks:
  bnf:
    name: bnf

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    networks:
      bnf:
        aliases:
          - postgres
    environment:
      POSTGRES_DB: bnf_dev
      POSTGRES_USER: bnf_user
      POSTGRES_PASSWORD: bnf_dev_password
    ports:
      - "5437:5432"
    volumes:
      - bnf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bnf_user -d bnf_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # BnF broker — single egress chokepoint for all BnF traffic. Owns the OAuth
  # token + shared rate caps; the app and worker hold no BnF credentials. Creds
  # live in ./broker/.env (gitignored). Reached by the worker in-network at
  # http://broker:8792 and by the host-side Next.js app at http://localhost:8792.
  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      bnf:
        aliases:
          - broker
    env_file:
      - ./broker/.env
    ports:
      - "8792:8792"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8792/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    profiles:
      - worker

  # bnf-ingest worker (V2) — the staged-bucket pipeline. Pulls jobs from pg-boss
  # (v2.* queues) through metadata→manifest→fetch→…→register and serves the
  # app↔worker HTTP ingress on 7777 (POST /ingest, GET /progress/:runId, cancel,
  # health). REPLACES V1 (./worker) — clean break, no dual-worker. Scale with
  # `docker compose up --scale ingest-worker=N`; pg-boss row-locks prevent double
  # processing. NOTE: the BnF 300/min credential is the shared ceiling, so scale
  # buys resilience, not throughput.
  ingest-worker:
    build:
      context: ./worker-v2
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - bnf
    extra_hosts:
      # Lets the worker reach the host's Next.js dev server on :3001 to fire the
      # terminal ingest-commit callback. On Docker Desktop this is automatic; on
      # native Linux we have to map host.docker.internal → host-gateway.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    env_file:
      # Mirrors V1's env var names (S3, broker, vision/embed/cluster creds) so the
      # same secrets carry over. Gitignored; copy from ./worker/.env if migrating.
      - ./worker-v2/.env
    environment:
      # Inside the compose network postgres is reachable at host=postgres:5432.
      # Override DATABASE_URL here so the .env's localhost:5437 still works for
      # host-side tools (seed.ts, status.ts).
      DATABASE_URL: "postgresql://bnf_user:bnf_dev_password@postgres:5432/bnf_dev"
      # Reach the broker in-network (overrides the .env's host.docker.internal
      # form, which is for host-side tools). All BnF egress flows through it.
      BNF_BROKER_URL: "http://broker:8792"
      # The host-side app talks to the worker over loopback on port 7777 (see
      # WORKER_RUNNER_URL in bnf/.env.local). On Linux that means we bind the
      # container's port to the host.
      WORKER_HTTP_PORT: "7777"
    ports:
      - "7777:7777"
    stop_grace_period: 60s
    profiles:
      # Opt-in: `docker compose --profile worker up` so the worker doesn't
      # start by accident on a plain `docker compose up postgres`.
      - worker

volumes:
  bnf_postgres_data:
