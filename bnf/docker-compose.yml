services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bnf_dev
      POSTGRES_USER: bnf_user
      POSTGRES_PASSWORD: bnf_dev_password
    ports:
      - "5434:5432"
    volumes:
      - bnf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bnf_user -d bnf_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bnf_postgres_data:
