apiVersion: v2
name: bnf-demo
version: 0.12.0
description: BnF Corpus Research — Alien Intelligence × BnF demo (Next.js app + ingest worker + BnF broker + Postgres)
type: application
# 0.9.0 — worker+broker hardening pass 2: pg-boss sliding-window fetch (the ~600/min
# batch-barrier fix), gemini-2.5-flash vision, 120s BnF timeouts, OpenRouter retry,
# non-empty failure reasons, OCR Buffer assembly.
# 0.9.1 — worker-only: OpenRouter JSON mode (response_format) + robust JSON
# extraction + truncation retry (gemini-2.5-flash was returning unparseable JSON on
# real estampes). App image stays 0.9.0; worker → 0.9.1.
# 0.9.2 — worker-only: bound runaway describe (max_tokens 16384→8192) + raise
# temperature on a truncation retry to break gemini-2.5-flash repetition loops that
# ran to the token ceiling on dense folios. App stays 0.9.0; worker → 0.9.2.
# 0.9.3 — chart-only: DESCRIBE_CONCURRENCY 16→32 (describe became the slow lane once
# fetch hit 1000/min). No image change; configmap checksum rolls the worker.
# 0.10.0 — run-scoped progress read-model: the shared pg-boss bucket counts are now
# filtered to the run's own docs (concurrent jobs no longer show each other's stage
# activity), + a "folios ahead of you" counter for the shared fetch queue. Worker +
# app (card display + contract). Broker unchanged.
# 0.11.0 — skipped: deployed out-of-band to prod, never landed on main (version drift).
# 0.12.0 — chart-only: broker memory 256Mi→2Gi. It buffers each upstream response body
# whole before mirroring (server.ts arrayBuffer), so at worker bnfFetchConcurrency=128 ×
# ~10MB folio images it held >1GB and OOMKilled — the single-replica broker going down
# was the root cause of the mass "all ingestions failed" incident. Also drops the dead
# BNF_ALTO_CONCURRENCY (set by the chart, read by nothing in worker-v2) and de-stales the
# fetch/doc-job rate comments (still described the pre-1000/min regime). No image change.
appVersion: "0.10.0"
