# Real credentials pulled from Scaleway Secret Manager via external-secrets.
# One remote secret ({{ .Values.secrets.scalewaySecretName }}) holds every
# property; these ExternalSecrets project the subsets each workload needs.
{{- $store := "scaleway-secret-manager" }}
{{- $remote := printf "name:%s" .Values.secrets.scalewaySecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bnf-demo.fullname" . }}-app-creds
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  # Normalized form ("1h" → "1h0m0s") so it matches what the external-secrets
  # controller writes back. With a bare "1h", Helm's server-side apply conflicts
  # with the controller over ownership of .spec.refreshInterval on every upgrade.
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "bnf-demo.fullname" . }}-app-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.anthropicApiKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: BNF_MCP_TOKEN
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.bnfMcpTokenProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- if eq .Values.config.clusterMode "real" }}
    - secretKey: CLUSTER_BEARER_TOKEN
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.clusterBearerTokenProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- end }}
    {{- if .Values.config.langfusePublicKey }}
    - secretKey: LANGFUSE_SECRET_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.langfuseSecretKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- end }}

{{- if and .Values.worker.enabled (eq .Values.config.clusterMode "real") }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bnf-demo.fullname" . }}-worker-creds
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  # Normalized form ("1h" → "1h0m0s") so it matches what the external-secrets
  # controller writes back. With a bare "1h", Helm's server-side apply conflicts
  # with the controller over ownership of .spec.refreshInterval on every upgrade.
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "bnf-demo.fullname" . }}-worker-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: SCW_S3_ACCESS_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.scwS3AccessKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: SCW_S3_SECRET_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.scwS3SecretKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: SCW_API_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.scwApiKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: GOOGLE_AI_API_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.googleAiApiKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: RUNPOD_API_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.runpodApiKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: CLUSTER_BEARER_TOKEN
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.clusterBearerTokenProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
{{- end }}
