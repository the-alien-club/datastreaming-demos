{{- end }}

{{- if .Values.broker.enabled }}
---
# BnF broker credentials — the OAuth client_credentials (KEY/SECRET) that mint
# the partner-API bearer. These live ONLY behind the broker; neither the app nor
# the worker ever sees them. Projected into a dedicated Secret consumed by the
# broker Deployment's envFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bnf-demo.fullname" . }}-broker-creds
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: broker
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "bnf-demo.fullname" . }}-broker-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: BNF_CLIENT_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.bnfClientKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: BNF_CLIENT_SECRET
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.bnfClientSecretProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
{{- end }}
