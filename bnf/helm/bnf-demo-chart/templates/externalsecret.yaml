# Real credentials pulled from Scaleway Secret Manager via external-secrets.
# One remote secret ({{ .Values.secrets.scalewaySecretName }}) holds every
# property; these ExternalSecrets project the subsets each workload needs.
{{- $store := "scaleway-secret-manager" }}
{{- $remote := printf "name:%s" .Values.secrets.scalewaySecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bnf-demo.fullname" . }}-app-creds
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  # Normalized form ("1h" → "1h0m0s") so it matches what the external-secrets
  # controller writes back. With a bare "1h", Helm's server-side apply conflicts
  # with the controller over ownership of .spec.refreshInterval on every upgrade.
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "bnf-demo.fullname" . }}-app-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.anthropicApiKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: BNF_MCP_TOKEN
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.bnfMcpTokenProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- if eq .Values.config.clusterMode "real" }}
    - secretKey: CLUSTER_BEARER_TOKEN
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.clusterBearerTokenProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- end }}
    {{- if .Values.config.langfusePublicKey }}
    - secretKey: LANGFUSE_SECRET_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.langfuseSecretKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- end }}
    {{- if eq .Values.config.agentProvider "openrouter" }}
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: {{ $remote }}
        property: {{ .Values.secrets.openrouterApiKeyProperty }}
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    {{- end }}

{{- if .Values.config.authentikBaseUrl }}
---
# Alien Auth (Authentik) OAuth credentials — pulled from the SHARED
# `authentik-prod` Scaleway secret (same OAuth application across all demos),
# NOT the per-demo `bnf-demo-prod` secret. Projected into its own k8s Secret and
# mounted via the deployment's envFrom. Mirrors the openaire-chart pattern.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bnf-demo.fullname" . }}-authentik
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ include "bnf-demo.fullname" . }}-authentik
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AUTHENTIK_CLIENT_ID
      remoteRef:
        key: name:{{ .Values.secrets.authentikScalewaySecretName }}
        property: AUTHENTIK_CLIENT_ID
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: name:{{ .Values.secrets.authentikScalewaySecretName }}
        property: AUTHENTIK_CLIENT_SECRET
      sourceRef:
        storeRef:
          name: {{ $store }}
          kind: ClusterSecretStore
{{- end }}

{{- if and .Values.worker.enabled (eq .Values.config.clusterMode "real") }}
