{{- if .Values.broker.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bnf-demo.fullname" . }}-broker-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: broker
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  PORT: {{ .Values.broker.service.port | quote }}

  # --- Upstream BnF endpoints (non-secret) ---
  BNF_OAUTH_TOKEN_URL: {{ .Values.broker.config.oauthTokenUrl | quote }}
  BNF_API_BASE_URL: {{ .Values.broker.config.apiBaseUrl | quote }}

  # --- Rate caps (requests/min) — these WILL rise; bump here, no code change.
  # Defaults are live-measured (2026-06-24 sandbox key): global ~150 enforced,
  # manifest verified EXACTLY 12/min/IP. See ai-memories bnf-partner-api-design.
  BNF_GLOBAL_RPM: {{ .Values.broker.config.globalRpm | quote }}
  BNF_MANIFEST_RPM: {{ .Values.broker.config.manifestRpm | quote }}
  BNF_EXTERNAL_RPM: {{ .Values.broker.config.externalRpm | quote }}

  # --- Timeouts ---
  # Per-attempt upstream timeout to BnF. 120s: under ingest load BnF is slow to
  # serve folio images; a tight timeout just churns the shared quota with retries.
  # The worker waits a touch longer (BNF_PAGE_TIMEOUT_MS, 135s) so this fires first.
  BNF_UPSTREAM_TIMEOUT_MS: {{ .Values.broker.config.upstreamTimeoutMs | quote }}
{{- end }}
