{{- if and .Values.worker.enabled (eq .Values.config.clusterMode "real") }}
# ClusterIP only — the worker API is internal (app → worker). Never exposed
# through Istio.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bnf-demo.fullname" . }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: {{ .Values.worker.service.type }}
  ports:
    - port: {{ .Values.worker.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bnf-demo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
{{- end }}
