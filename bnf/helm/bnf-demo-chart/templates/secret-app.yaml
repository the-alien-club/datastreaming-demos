# App-generated secrets — created once on first install and preserved across
# upgrades (helm.sh/resource-policy: keep + lookup):
#   BETTER_AUTH_SECRET — rotating it invalidates every user session.
#   JOB_CALLBACK_SECRET — the HMAC key the app signs ingest-callback requests
#     with and hands to the worker per job; rotating it breaks in-flight jobs.
{{- $secretName := printf "%s-app" (include "bnf-demo.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $existing }}
  BETTER_AUTH_SECRET: {{ index $existing.data "BETTER_AUTH_SECRET" }}
  JOB_CALLBACK_SECRET: {{ index $existing.data "JOB_CALLBACK_SECRET" }}
  {{- else }}
  BETTER_AUTH_SECRET: {{ randAlphaNum 48 | b64enc }}
  JOB_CALLBACK_SECRET: {{ randAlphaNum 48 | b64enc }}
  {{- end }}
