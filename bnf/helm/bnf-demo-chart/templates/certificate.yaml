{{- if .Values.istio.certificate.enabled }}
{{- $ownHostsRaw := list }}
{{- range .Values.istio.hosts }}
  {{- if eq (.gateway | default "shared") "own" }}
    {{- $ownHostsRaw = append $ownHostsRaw .host }}
  {{- end }}
{{- end }}
{{- $ownHosts := $ownHostsRaw | uniq }}
{{- if $ownHosts }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "bnf-demo.fullname" . }}-tls
  # Must live in the gateway namespace so Istio can mount the TLS secret.
  namespace: {{ .Values.istio.gatewayNamespace }}
  labels:
    {{- include "bnf-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate
spec:
  secretName: {{ include "bnf-demo.fullname" . }}-tls
  issuerRef:
    name: {{ .Values.istio.certificate.issuerName }}
    kind: ClusterIssuer
  dnsNames:
    {{- range $ownHosts }}
    - {{ . }}
    {{- end }}
{{- end }}
{{- end }}
