# App secrets — ADMIN_OAT + ANTHROPIC_API_KEY pulled from Scaleway Secret
# Manager. Both properties live on a single Scaleway secret so a future
# environment switch is a single `secrets.scalewaySecretName` override.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "publisher-demo.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "publisher-demo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "publisher-demo.fullname" . }}-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ADMIN_OAT
      remoteRef:
        key: name:{{ .Values.secrets.scalewaySecretName }}
        property: {{ .Values.secrets.adminOatProperty }}
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: name:{{ .Values.secrets.scalewaySecretName }}
        property: {{ .Values.secrets.anthropicApiKeyProperty }}
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore
