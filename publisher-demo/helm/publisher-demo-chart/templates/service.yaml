apiVersion: v1
kind: Service
metadata:
  name: {{ include "publisher-demo.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "publisher-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "publisher-demo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
