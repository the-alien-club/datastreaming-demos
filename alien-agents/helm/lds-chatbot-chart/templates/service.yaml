apiVersion: v1
kind: Service
metadata:
  name: {{ include "lds-chatbot.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "lds-chatbot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
