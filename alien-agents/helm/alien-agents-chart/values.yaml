replicaCount: 1

image:
  repository: rg.fr-par.scw.cloud/ns-data-streaming/alien-agents
  # IfNotPresent — image tags are immutable numeric versions, so re-pulling
  # on every pod start is wasted bandwidth + slower restarts (D-P1.4).
  pullPolicy: Always
  tag: "0.3.9"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

namespace: alien-agents

# Each entry has `host`, `path` prefix, optional `rewrite`, and `gateway` selector:
#   - path:    URI prefix the VirtualService matches inbound requests against
#   - rewrite: optional URI prefix to substitute the matched `path` with before
#              forwarding to the pod. Use it when a host serves the chatbot at
#              a different prefix than the app's NEXT_PUBLIC_BASE_PATH. The pod
#              still expects basePath-prefixed routes (asset URLs, redirects,
#              etc. all carry the basePath), so this rewrite makes a bare-domain
#              host work without redeploying the app — at the cost of the
#              browser ending up on the basePath-prefixed URL after the first
#              redirect (acceptable for a demo entry point).
#   - gateway: `shared` → bind to the existing Gateway in `sharedGatewayName`
#              `own`    → bind to the Gateway provisioned by this chart
#                         (requires gateway.create=true and certificate.enabled=true)
# `config.basePath` MUST equal the path the app is built with
# (NEXT_PUBLIC_BASE_PATH); the liveness/readiness probes hit basePath directly
# inside the pod, so they bypass any istio rewrite.
istio:
  hosts:
    - host: demo.alien.club
      path: /agents
      gateway: shared

  gatewayNamespace: istio-system
  # REQUIRED if any host uses `gateway: shared`. Name of an existing Istio
  # Gateway (in gatewayNamespace) that already serves the host. Discover with:
  #   kubectl get vs -A -o wide | grep <host>
  sharedGatewayName: ""

  gateway:
    # Required true if any host uses `gateway: own`. The chart provisions its
    # own Gateway covering only the `own` hosts (port 80 + 443).
    create: true

  virtualService:
    enabled: true
    # Both fields intentionally null — Istio rejects "0s" outright (must be
    # > 1ms), but treats an absent field as "no limit / no retries", which
    # is exactly what we want:
    #
    #   - `timeout`: chat streams SSE for the duration of the underlying
    #     workflow run; a finite timeout chops long answers mid-stream.
    #   - `retries`: POST /api/chat creates a conversation row and triggers
    #     a platform workflow run before any byte streams back — automatic
    #     retries would duplicate that side-effect. The path is non-idempotent.
    timeout: null
    retries: null

  certificate:
    # Required true if any host uses `gateway: own`. The chart issues a
    # cert-manager Certificate covering all `own` hosts and mounts it as
    # the Gateway's TLS credential.
    enabled: true
    issuerName: letsencrypt

# Bundled Postgres StatefulSet — single replica, PVC-backed, no replication.
# Suitable for a demo; not for real production data.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: alien_agents
  username: alien_agents
  # Password is generated once and preserved across upgrades (see postgres-secret.yaml).
  port: 5432
  persistence:
    size: 5Gi
    accessModes:
      - ReadWriteOnce
    # storageClassName: leave unset to use the cluster default (sbs-default on Scaleway)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  # Pointed at alpha while the alien-agents platform-side code (workflow engine
  # changes for this demo) hasn't been promoted to prod yet.
  platformApiUrl: https://api.alien.club
  clusterId: "41"
  # MCP endpoint for the data cluster behind clusterId=41. The corpus subagent
  # generated by `attachDatasetToAgent` hard-codes mcpIds: ["datacluster"], and
  # lib/platform/workflows.ts resolves that id to this URL via DATACLUSTER_MCP_URL.
  # If empty, the workflow build throws `Unknown MCP ID: datacluster` and the
  # attach call returns 500.
  datalclusterMcpUrl: "https://mcp-alien-agent-demo-cluster-1780063149705.mcp.alien.club/mcp"
  authentikBaseUrl: https://auth.alien.club
  authentikAppSlug: datastreaming
  # better-auth's baseURL is the bare host — basePath is added at the
  # auth-client/redirectURI layer via NEXT_PUBLIC_BASE_PATH. Combining them
  # here would double-prefix the auth routes (404).
  betterAuthUrl: https://demo.alien.club
  publicAppUrl: https://demo.alien.club/agents
  basePath: /agents
  # Set to "1" to print every globalThis.fetch URL+status to stderr — strictly
  # for debugging better-auth fetch failures. Empty = disabled.
  fetchTrace: ""
  # Numeric ID of the enterprise org users should be auto-provisioned into.
  # Must be set alongside secrets.chatbot.scalewaySecretName. Leave empty
  # to disable org auto-provisioning (chatbot works in standalone mode).
  orgId: ""
  # Comma-separated list of additional origins better-auth accepts for
  # CSRF/origin checks beyond `betterAuthUrl` (which is auto-trusted).
  # Required when serving the chatbot under multiple hostnames so that
  # sign-in / API calls from those hosts pass origin validation.
  betterAuthTrustedOrigins: ""
  # Service name reported to SigNoz. Keep stable across deploys so dashboards
  # and alerts don't need to be updated on every rename.
  otelServiceName: "alien-agents-prod"

# Scaleway Secret Manager references for secrets.
secrets:
  authentik:
    scalewaySecretName: authentik-prod
    clientIdProperty: AUTHENTIK_CLIENT_ID
    clientSecretProperty: AUTHENTIK_CLIENT_SECRET
  chatbot:
    # Name of the Scaleway Secret Manager secret containing ADMIN_TOKEN.
    # Leave empty to disable the chatbot ExternalSecret entirely.
    scalewaySecretName: ""
    adminTokenProperty: ADMIN_TOKEN

livenessProbe:
  httpGet:
    path: /agents/en/sign-in
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /agents/en/sign-in
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

podAnnotations:
  # Inject the OTel Node.js auto-instrumentation sidecar. The Instrumentation CR
  # lives in the signoz namespace so we reference it with the namespace/name form.
  instrumentation.opentelemetry.io/inject-nodejs: "signoz/signoz-instrumentation"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

nodeSelector: {}

tolerations: []

affinity: {}
