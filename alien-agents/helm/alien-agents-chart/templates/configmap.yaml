apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alien-agents.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alien-agents.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  PLATFORM_API_URL: {{ .Values.config.platformApiUrl | quote }}
  CLUSTER_ID: {{ .Values.config.clusterId | quote }}
  DATACLUSTER_MCP_URL: {{ .Values.config.datalclusterMcpUrl | quote }}
  AUTHENTIK_BASE_URL: {{ .Values.config.authentikBaseUrl | quote }}
  AUTHENTIK_APP_SLUG: {{ .Values.config.authentikAppSlug | quote }}
  BETTER_AUTH_URL: {{ .Values.config.betterAuthUrl | quote }}
  NEXT_PUBLIC_APP_URL: {{ .Values.config.publicAppUrl | quote }}
  NEXT_PUBLIC_BASE_PATH: {{ .Values.config.basePath | quote }}
  {{- with .Values.config.fetchTrace }}
  FETCH_TRACE: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.orgId }}
  ORG_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.betterAuthTrustedOrigins }}
  BETTER_AUTH_TRUSTED_ORIGINS: {{ . | quote }}
  {{- end }}
  OTEL_SERVICE_NAME: {{ .Values.config.otelServiceName | quote }}
