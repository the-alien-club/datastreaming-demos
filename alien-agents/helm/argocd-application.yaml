apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alien-agents-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/the-alien-club/datastreaming-demos.git
    targetRevision: main
    path: alien-agents/helm/alien-agents-chart
    helm:
      valueFiles:
        - values.yaml
      # istio.sharedGatewayName is required and intentionally left empty in
      # values.yaml — overridden here to the Gateway that serves demo.alien.club
      # on platform-prod. Update if that Gateway is ever renamed or replaced.
      parameters:
        - name: istio.sharedGatewayName
          value: demo-openaire-prod-gateway
        - name: config.orgId
          value: "3"
        - name: secrets.chatbot.scalewaySecretName
          value: alien-agents-prod

  destination:
    server: https://kubernetes.default.svc
    namespace: alien-agents

  # ArgoCD's `helm template` runs without cluster access, so the chart's
  # `lookup`-based password preservation does not work — every sync would
  # otherwise rotate POSTGRES_PASSWORD and BETTER_AUTH_SECRET, breaking auth
  # against an already-initialized Postgres and invalidating all sessions.
  # Ignore drift on /data of the two generated Secrets; first install still
  # creates them with random values, subsequent syncs leave them untouched.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: alien-agents-prod-postgres
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: alien-agents-prod-app
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      # Without this, sync IGNORES the ignoreDifferences block above and
      # patches the rendered (rotated) Secret values back into the cluster.
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
