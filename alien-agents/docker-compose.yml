# Local dev dependencies. Run `docker compose up -d` then `npm run dev`.
# Port 5435 avoids conflict with the platform DB (5432) and data-cluster DB (5433).
services:
  postgres:
    image: postgres:16-alpine
    container_name: alien-agents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alien_agents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alien_agents"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
