apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-lds-chatbot-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/the-alien-club/datastreaming-demos.git
    targetRevision: main
    path: lds-chatbot/helm/lds-chatbot-chart
    helm:
      valueFiles:
        - values.yaml
      # istio.sharedGatewayName is required and intentionally left empty in
      # values.yaml — overridden here to the Gateway that serves demo.alien.club
      # on platform-prod. Update if that Gateway is ever renamed or replaced.
      parameters:
        - name: istio.sharedGatewayName
          value: demo-openaire-prod-gateway

  destination:
    server: https://kubernetes.default.svc
    namespace: demo-lds-chatbot

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
