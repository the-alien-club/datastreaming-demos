{{- if .Values.postgres.enabled }}
{{- $secretName := printf "%s-postgres" (include "lds-chatbot.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName }}
{{- $password := "" }}
{{- if $existing }}
{{- $password = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
{{- $host := printf "%s-postgres.%s.svc.cluster.local" (include "lds-chatbot.fullname" .) .Values.namespace }}
{{- $databaseUrl := printf "postgres://%s:%s@%s:%d/%s" .Values.postgres.username $password $host (int .Values.postgres.port) .Values.postgres.database }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    helm.sh/resource-policy: keep
type: Opaque
data:
  POSTGRES_DB: {{ .Values.postgres.database | b64enc }}
  POSTGRES_USER: {{ .Values.postgres.username | b64enc }}
  POSTGRES_PASSWORD: {{ $password | b64enc }}
  DATABASE_URL: {{ $databaseUrl | b64enc }}
{{- end }}
