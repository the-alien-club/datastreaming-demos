{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lds-chatbot.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  # Headless — StatefulSet expects stable network identities.
  clusterIP: None
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "lds-chatbot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
