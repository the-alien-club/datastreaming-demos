{{- if .Values.istio.virtualService.enabled }}
{{- $gatewayName := "" }}
{{- if .Values.istio.gateway.create }}
{{- $gatewayName = printf "%s-gateway" (include "lds-chatbot.fullname" .) }}
{{- else }}
{{- $gatewayName = required "istio.sharedGatewayName must be set when istio.gateway.create is false — provide the name of an existing Istio Gateway (in istio.gatewayNamespace) that serves istio.hosts[*].host" .Values.istio.sharedGatewayName }}
{{- end }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "lds-chatbot.fullname" . }}-vs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: virtualservice
spec:
  hosts:
    {{- range .Values.istio.hosts }}
    - {{ .host }}
    {{- end }}
  gateways:
    - {{ .Values.istio.gatewayNamespace }}/{{ $gatewayName }}
  http:
    {{- range .Values.istio.hosts }}
    - name: lds-chatbot-route-{{ .host | replace "." "-" }}
      match:
        - uri:
            prefix: {{ .path }}
          authority:
            exact: {{ .host }}
      route:
        - destination:
            host: {{ include "lds-chatbot.fullname" $ }}.{{ $.Values.namespace }}.svc.cluster.local
            port:
              number: {{ $.Values.service.port }}
      {{- with $.Values.istio.virtualService.timeout }}
      timeout: {{ . }}
      {{- end }}
      {{- with $.Values.istio.virtualService.retries }}
      retries:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
