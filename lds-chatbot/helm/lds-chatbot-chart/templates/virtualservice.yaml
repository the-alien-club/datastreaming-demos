{{- if .Values.istio.virtualService.enabled }}
{{- $gatewayName := "" }}
{{- if .Values.istio.gateway.create }}
{{- $gatewayName = printf "%s-gateway" (include "lds-chatbot.fullname" .) }}
{{- else }}
{{- $gatewayName = required "istio.sharedGatewayName must be set when istio.gateway.create is false — provide the name of an existing Istio Gateway (in istio.gatewayNamespace) that serves istio.host" .Values.istio.sharedGatewayName }}
{{- end }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "lds-chatbot.fullname" . }}-vs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: virtualservice
spec:
  hosts:
    - {{ .Values.istio.host }}
  gateways:
    - {{ .Values.istio.gatewayNamespace }}/{{ $gatewayName }}
  http:
    - name: lds-chatbot-route
      match:
        - uri:
            prefix: {{ .Values.istio.path }}
      route:
        - destination:
            host: {{ include "lds-chatbot.fullname" . }}.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.service.port }}
      {{- with .Values.istio.virtualService.timeout }}
      timeout: {{ . }}
      {{- end }}
      {{- with .Values.istio.virtualService.retries }}
      retries:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
