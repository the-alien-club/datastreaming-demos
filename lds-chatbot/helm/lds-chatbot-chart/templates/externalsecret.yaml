# Authentik OAuth credentials — pulled from Scaleway Secret Manager.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lds-chatbot.fullname" . }}-authentik
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "lds-chatbot.fullname" . }}-authentik
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AUTHENTIK_CLIENT_ID
      remoteRef:
        key: name:{{ .Values.secrets.authentik.scalewaySecretName }}
        property: {{ .Values.secrets.authentik.clientIdProperty }}
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: name:{{ .Values.secrets.authentik.scalewaySecretName }}
        property: {{ .Values.secrets.authentik.clientSecretProperty }}
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore

{{- if .Values.secrets.chatbot.scalewaySecretName }}
# Org chatbot credentials — ADMIN_TOKEN pulled from Scaleway Secret Manager.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lds-chatbot.fullname" . }}-chatbot
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "lds-chatbot.fullname" . }}-chatbot
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: name:{{ .Values.secrets.chatbot.scalewaySecretName }}
        property: {{ .Values.secrets.chatbot.adminTokenProperty }}
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore
{{- end }}

# App-specific secret — BETTER_AUTH_SECRET is generated once on first install
# and preserved across upgrades so existing user sessions remain valid.
{{- $secretName := printf "%s-app" (include "lds-chatbot.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lds-chatbot.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $existing }}
  BETTER_AUTH_SECRET: {{ index $existing.data "BETTER_AUTH_SECRET" }}
  {{- else }}
  BETTER_AUTH_SECRET: {{ randAlphaNum 48 | b64enc }}
  {{- end }}
