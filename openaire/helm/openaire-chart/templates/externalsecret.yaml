# Authentik OAuth credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "openaire.fullname" . }}-authentik
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openaire.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "openaire.fullname" . }}-authentik
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AUTHENTIK_CLIENT_ID
      remoteRef:
        key: name:authentik-prod
        property: AUTHENTIK_CLIENT_ID
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: name:authentik-prod
        property: AUTHENTIK_CLIENT_SECRET
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore

# Anthropic API key — dedicated openaire-demo secret in Scaleway Secret Manager
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "openaire.fullname" . }}-ai-providers
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openaire.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "openaire.fullname" . }}-ai-providers
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: name:openaire-demo
        property: ANTHROPIC_API_KEY
      sourceRef:
        storeRef:
          name: scaleway-secret-manager
          kind: ClusterSecretStore

# App-specific secrets — BETTER_AUTH_SECRET is generated once on first install and never rotated
{{- $secretName := printf "%s-app" (include "openaire.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openaire.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $existing }}
  BETTER_AUTH_SECRET: {{ index $existing.data "BETTER_AUTH_SECRET" }}
  {{- else }}
  BETTER_AUTH_SECRET: {{ randAlphaNum 48 | b64enc }}
  {{- end }}
