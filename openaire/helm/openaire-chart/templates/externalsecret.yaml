# Authentik OAuth credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "openaire.fullname" . }}-authentik
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openaire.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "openaire.fullname" . }}-authentik
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AUTHENTIK_CLIENT_ID
      remoteRef:
        key: name:authentik-prod
        property: AUTHENTIK_CLIENT_ID
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: name:authentik-prod
        property: AUTHENTIK_CLIENT_SECRET

