replicaCount: 1

image:
  repository:  rg.fr-par.scw.cloud/ns-data-streaming/demo-openaire
  pullPolicy: Always
  tag: "0.1.18"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false  # Disabled - using Istio Gateway + VirtualService instead

# Istio Gateway / VirtualService / Certificate configuration
namespace: demo-openaire

istio:
  host: demo.alien.club
  path: /openaire

  gatewayNamespace: istio-system

  gateway:
    create: true

  virtualService:
    enabled: true
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure,refused-stream

  certificate:
    enabled: true
    issuerName: letsencrypt

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Non-sensitive config — override these in ArgoCD helm.values
config:
  openaireeMcpUrl: https://openaire.mcp.alien.club/mcp
  marketplaceBranch: main
  authentikBaseUrl: https://auth.alien.club
  authentikAppSlug: datastreaming
  betterAuthUrl: https://demo.alien.club

livenessProbe:
  httpGet:
    path: /openaire
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /openaire
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

nodeSelector: {}

tolerations: []

affinity: {}
