services:
  openaire:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-demo-openaire:latest}
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Plugin marketplace branch (default: local). Change to dev/main for other environments.
      - MARKETPLACE_BRANCH=${MARKETPLACE_BRANCH:-local}
      # OpenAIRE MCP URL — configured programmatically (auth token injected per-request)
      - OPENAIRE_MCP_URL=${OPENAIRE_MCP_URL}
      - LOG_LEVEL=info
      # Authentik OAuth via Better Auth
      - NEXT_PUBLIC_AUTHENTIK_BASE_URL=${NEXT_PUBLIC_AUTHENTIK_BASE_URL:?Set NEXT_PUBLIC_AUTHENTIK_BASE_URL}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
      - AUTHENTIK_APP_SLUG=${AUTHENTIK_APP_SLUG:-datastreaming}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:?Set BETTER_AUTH_URL}
    # Required on Linux: Docker Desktop adds host.docker.internal automatically
    # but native Linux Docker does not. Without this the container can't reach
    # OPENAIRE_MCP_URL when it points at localhost-on-host (e.g. dev stack).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
